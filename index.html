<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Breathflow Ratios</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #f0f4f0;
    --card: rgba(255,255,255,0.92);
    --accent: #1D9E75;
    --accent-2: #0F6E56;
    --accent-light: #E1F5EE;
    --muted: #7a8a7a;
    --text: #1a2a1a;
    --border: rgba(60,100,60,0.15);
    --card-inner: rgba(240,248,240,0.7);
    --amber-bg: #FAEEDA;
    --amber-border: #EF9F27;
    --amber-text: #633806;
    --red-bg: #FAECE7;
    --red-border: #D85A30;
    --red-text: #4A1B0C;
    --blue-bg: #E6F1FB;
    --blue-text: #042C53;
    --blue-active: #378ADD;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    font-family: 'DM Sans', sans-serif;
    background: var(--bg); color: var(--text);
    padding: 20px 16px 40px;
  }
  .app { max-width: 780px; margin: 0 auto; }
  .top-row { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; flex-wrap: wrap; }
  .app-title { font-size: 22px; font-weight: 600; flex: 1; letter-spacing: -.3px; }
  .app-sub { font-size: 12px; color: var(--muted); margin-bottom: 14px; }
  .time-ctrl { display: flex; align-items: center; gap: 8px; }
  .time-ctrl label { font-size: 13px; color: var(--muted); }
  .time-ctrl input {
    width: 72px; text-align: center; font-size: 16px; font-weight: 500;
    font-family: 'DM Mono', monospace; padding: 8px 10px;
    border-radius: 10px; border: 1.5px solid var(--border);
    background: #fff; color: var(--text); outline: none;
  }
  .time-ctrl input:focus { border-color: var(--accent); }
  .time-ctrl span { font-size: 13px; color: var(--muted); }
  .saved-banner {
    display: none; align-items: center; gap: 8px;
    background: var(--accent-light); border-radius: 10px;
    padding: 8px 12px; margin-bottom: 14px;
    font-size: 12px; color: var(--accent-2);
    border: 1px solid rgba(29,158,117,.2);
  }
  .saved-banner.show { display: flex; }
  .saved-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .saved-banner button {
    margin-left: auto; font-size: 11px; background: none;
    border: 1px solid #5DCAA5; border-radius: 6px;
    padding: 3px 9px; color: var(--accent-2); cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }
  .saved-banner button:hover { background: rgba(29,158,117,.1); }
  .save-indicator {
    font-size: 11px; color: var(--accent); text-align: right;
    margin-bottom: 10px; min-height: 15px;
    transition: opacity .6s ease; font-family: 'DM Mono', monospace;
  }
  .save-indicator.fade { opacity: 0; }
  .phases-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  @media(max-width:540px){ .phases-grid { grid-template-columns: 1fr; } }
  .phase-card {
    background: var(--card); border: 1.5px solid var(--border);
    border-radius: 16px; padding: 14px; transition: border-color .2s;
  }
  .phase-card.selected { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(29,158,117,.1); }
  .phase-header { display: flex; align-items: center; gap: 9px; margin-bottom: 11px; }
  .phase-num {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--accent-light); color: var(--accent-2);
    font-size: 13px; font-weight: 600;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .phase-title { font-size: 14px; font-weight: 600; }
  .phase-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .diff-row { display: flex; gap: 6px; margin-bottom: 8px; }
  .diff-btn {
    flex: 1; padding: 7px 4px; font-size: 12px; font-weight: 600;
    border: 1.5px solid var(--border); border-radius: 10px;
    background: var(--card-inner); color: var(--muted);
    cursor: pointer; transition: all .15s; text-align: center;
    font-family: 'DM Sans', sans-serif;
  }
  .diff-btn:hover { border-color: var(--accent); color: var(--accent-2); }
  .diff-btn.active.easy   { background: var(--accent-light); border-color: #5DCAA5; color: var(--accent-2); }
  .diff-btn.active.medium { background: var(--amber-bg);     border-color: var(--amber-border); color: var(--amber-text); }
  .diff-btn.active.hard   { background: var(--red-bg);       border-color: var(--red-border);   color: var(--red-text); }
  .sub-levels { display: none; gap: 5px; margin-bottom: 8px; }
  .sub-levels.open { display: flex; }
  .sub-btn {
    flex: 1; padding: 6px 4px; font-size: 11px; font-weight: 500;
    border: 1.5px solid var(--border); border-radius: 9px;
    background: #fff; color: var(--muted);
    cursor: pointer; transition: all .15s; text-align: center;
    font-family: 'DM Mono', monospace;
  }
  .sub-btn:hover { border-color: var(--accent); color: var(--accent-2); }
  .sub-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .level-preview { font-size: 11px; color: var(--muted); min-height: 16px; line-height: 1.5; }
  .level-preview span { color: var(--accent-2); font-weight: 600; }
  .session-info {
    background: var(--card); border: 1.5px solid var(--border);
    border-radius: 14px; padding: 12px 16px; margin-bottom: 16px;
    display: flex; gap: 16px; flex-wrap: wrap; align-items: center;
  }
  .si-item { display: flex; flex-direction: column; gap: 2px; }
  .si-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
  .si-val { font-size: 16px; font-weight: 600; font-family: 'DM Mono', monospace; }
  .si-phases { flex: 1; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .phase-pill {
    font-size: 11px; padding: 3px 10px; border-radius: 99px;
    background: var(--accent-light); color: var(--accent-2); font-weight: 600;
  }
  .btns { display: flex; gap: 10px; justify-content: center; margin-bottom: 24px; flex-wrap: wrap; }
  .btn-start {
    background: var(--accent); color: #fff; border: none;
    padding: 12px 32px; border-radius: 12px; font-size: 15px; font-weight: 600;
    cursor: pointer; font-family: 'DM Sans', sans-serif; transition: opacity .15s, transform .1s;
  }
  .btn-start:hover:not(:disabled) { opacity: .88; transform: translateY(-1px); }
  .btn-start:disabled { opacity: .35; cursor: not-allowed; }
  .btn-ctrl {
    padding: 12px 22px; border-radius: 12px; font-size: 15px; font-weight: 600;
    cursor: pointer; border: 1.5px solid var(--border);
    background: var(--card); color: var(--text);
    font-family: 'DM Sans', sans-serif; transition: opacity .15s;
  }
  .btn-ctrl:disabled { opacity: .3; cursor: not-allowed; }
  .btn-ctrl:hover:not(:disabled) { background: var(--accent-light); }
  .btn-skip {
    padding: 12px 22px; border-radius: 12px; font-size: 15px; font-weight: 600;
    cursor: pointer; border: 1.5px solid var(--amber-border);
    background: var(--amber-bg); color: var(--amber-text);
    font-family: 'DM Sans', sans-serif; transition: opacity .15s;
  }
  .btn-skip:disabled { opacity: .3; cursor: not-allowed; }
  .btn-skip:hover:not(:disabled) { opacity: .82; }
  .runner { display: none; flex-direction: column; align-items: center; gap: 14px; }
  .runner.on { display: flex; }
  .arc-wrap { position: relative; width: 200px; height: 200px; flex-shrink: 0; }
  .arc-wrap svg { position: absolute; top:0; left:0; width:100%; height:100%; transform: rotate(-90deg); }
  .arc-num {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px;
  }
  .arc-count { font-size: 52px; font-weight: 600; font-family: 'DM Mono', monospace; line-height: 1; }
  .arc-pname { font-size: 13px; color: var(--muted); }
  .runner-info { text-align: center; }
  .ri-pattern { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .ri-round { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .ri-status { font-size: 13px; color: var(--muted); margin-top: 8px; }
  .phase-chips { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-top: 6px; }
  .pchip { padding: 5px 14px; border-radius: 99px; font-size: 12px; font-weight: 600; }
  .pchip.ci { background: var(--accent-light); color: var(--accent-2); }
  .pchip.ch { background: var(--red-bg);       color: var(--red-text); }
  .pchip.ce { background: var(--blue-bg);      color: var(--blue-text); }
  .pchip.active-ci { background: var(--accent);     color: #fff; }
  .pchip.active-ch { background: var(--red-border);  color: #fff; }
  .pchip.active-ce { background: var(--blue-active); color: #fff; }
  .skip-toast {
    font-size: 12px; color: var(--amber-text);
    background: var(--amber-bg); border: 1px solid var(--amber-border);
    border-radius: 8px; padding: 5px 14px;
    text-align: center;
    opacity: 0; transition: opacity .4s ease;
  }
  .skip-toast.show { opacity: 1; }
  .watch-wrap {
    display: flex; flex-direction: column; align-items: center;
    gap: 14px; padding: 10px 0;
  }
  .watch-face {
    position: relative; width: 200px; height: 200px;
    display: flex; align-items: center; justify-content: center;
  }
  .watch-face svg { position: absolute; top:0; left:0; width:100%; height:100%; }
  .watch-content {
    position: relative; z-index: 2;
    display: flex; flex-direction: column; align-items: center; text-align: center;
  }
  .watch-time   { font-family: 'DM Mono', monospace; font-size: 36px; font-weight: 500; letter-spacing: 3px; line-height: 1; margin-bottom: 3px; }
  .watch-ampm   { font-size: 10px; font-weight: 700; letter-spacing: .2em; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; }
  .watch-date   { font-size: 10px; font-weight: 500; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .watch-divider { width: 22px; height: 1px; background: var(--accent); opacity: .4; margin: 0 auto 8px; }
  .watch-quote  { font-size: 10px; font-weight: 300; color: var(--accent-2); letter-spacing: .04em; line-height: 1.6; font-style: italic; }
  .idle-hint    { font-size: 12px; color: var(--muted); }
</style>
</head>
<body>
<div class="app">

  <div class="top-row">
    <div class="app-title">Breathflow Ratios</div>
    <div class="time-ctrl">
      <label for="totalMin">Session</label>
      <input type="number" id="totalMin" min="1" max="120" value="10" step="1"/>
      <span>min</span>
    </div>
  </div>
  <div class="app-sub">Select levels for each phase you want — time is split equally across selected phases.</div>

  <div class="saved-banner" id="savedBanner">
    <div class="saved-dot"></div>
    <span id="savedBannerText">Restored your last session settings</span>
    <button id="clearBtn">Clear saved</button>
  </div>

  <div class="save-indicator" id="saveInd"></div>
  <div class="phases-grid" id="phasesGrid"></div>

  <div class="session-info">
    <div class="si-item"><div class="si-label">Session total</div><div class="si-val" id="siTime">—</div></div>
    <div class="si-item"><div class="si-label">Active phases</div><div class="si-val" id="siCount">0</div></div>
    <div class="si-phases" id="siPhases"></div>
  </div>

  <div class="btns">
    <button class="btn-start" id="startBtn" disabled>Start session</button>
    <button class="btn-ctrl"  id="pauseBtn" disabled>Pause</button>
    <button class="btn-skip"  id="skipBtn"  disabled>Skip phase</button>
    <button class="btn-ctrl"  id="stopBtn"  disabled>Stop</button>
  </div>

  <div class="skip-toast" id="skipToast"></div>

  <div class="watch-wrap" id="watchWrap">
    <div class="watch-face">
      <svg id="watchSvg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <circle cx="100" cy="100" r="96" fill="none" stroke="rgba(46,139,94,0.12)" stroke-width="1.5"/>
        <circle cx="100" cy="100" r="86" fill="none" stroke="rgba(46,139,94,0.07)" stroke-width="1"/>
      </svg>
      <div class="watch-content">
        <div class="watch-time" id="watchTime">--:--</div>
        <div class="watch-ampm" id="watchAmpm">AM</div>
        <div class="watch-date" id="watchDate">--- -- ----</div>
        <div class="watch-divider"></div>
        <div class="watch-quote">Breathe better.<br>Live better.</div>
      </div>
    </div>
    <div class="idle-hint">Select levels above and press Start</div>
  </div>

  <div class="runner" id="runner">
    <div class="arc-wrap">
      <svg viewBox="0 0 200 200">
        <circle cx="100" cy="100" r="86" fill="none" stroke="rgba(60,100,60,0.1)" stroke-width="11"/>
        <circle cx="100" cy="100" r="86" fill="none" stroke-width="11" stroke-linecap="round"
          stroke-dasharray="540" stroke-dashoffset="540" id="arcEl" style="transition:stroke .3s"/>
      </svg>
      <div class="arc-num">
        <div class="arc-count" id="arcCount">—</div>
        <div class="arc-pname" id="arcPname"></div>
      </div>
    </div>
    <div class="runner-info">
      <div class="ri-pattern" id="riPattern"></div>
      <div class="ri-round"   id="riRound"></div>
      <div class="phase-chips" id="phaseChips"></div>
      <div class="ri-status"  id="riStatus"></div>
    </div>
  </div>

</div>

<script>
(() => {
  'use strict';

  const STORAGE_KEY = 'breathflow_v1';

  const PHASES = [
    {
      id: 'p1', label: 'Phase 1', ratio: '1:1', name: 'Equal Breathing',
      parts: [1, 1], phases: ['Inhale', 'Exhale'],
      levels: { easy: [3, 5, 8], medium: [10, 12, 14], hard: [16, 20, 24] }
    },
    {
      id: 'p2', label: 'Phase 2', ratio: '1:2:4', name: '',
      parts: [1, 2, 4], phases: ['Inhale', 'Hold', 'Exhale'],
      levels: { easy: [1, 2, 3], medium: [4, 5, 6], hard: [7, 8, 9] }
    },
    {
      id: 'p3', label: 'Phase 3', ratio: '1:1:1', name: '',
      parts: [1, 1, 1], phases: ['Inhale', 'Hold', 'Exhale'],
      levels: { easy: [3, 4, 6], medium: [8, 10, 14], hard: [16, 18, 20] }
    },
    {
      id: 'p4', label: 'Phase 4', ratio: '1:1:1:1', name: '',
      parts: [1, 1, 1, 1], phases: ['Inhale', 'Hold', 'Exhale', 'Hold'],
      levels: { easy: [3, 4, 5], medium: [6, 7, 8], hard: [10, 11, 12] }
    },
  ];

  const $ = id => document.getElementById(id);
  const phaseSecs = (ph, inh) => ph.parts.map(x => Math.round(inh * x / ph.parts[0]));
  const roundDur  = (ph, inh) => phaseSecs(ph, inh).reduce((a, b) => a + b, 0);
  const fmtMMSS   = s => {
    s = Math.max(0, Math.floor(s));
    return String(Math.floor(s / 60)).padStart(2, '0') + ':' + String(s % 60).padStart(2, '0');
  };
  const getInh = (ph, d, s) => ph.levels[d][s];

  const state = {};
  PHASES.forEach(p => { state[p.id] = { diff: null, sub: null }; });

  let saveTimer = null;

  function saveState() {
    try {
      const data = { mins: $('totalMin').value, phases: {} };
      PHASES.forEach(ph => { data.phases[ph.id] = { diff: state[ph.id].diff, sub: state[ph.id].sub }; });
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      showSaveInd();
    } catch (e) {}
  }

  function showSaveInd() {
    const el = $('saveInd');
    el.textContent = '✓ Saved to this device';
    el.style.opacity = '1';
    el.classList.remove('fade');
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => el.classList.add('fade'), 2200);
  }

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return false;
      const data = JSON.parse(raw);
      if (data.mins) $('totalMin').value = data.mins;
      let any = false;
      PHASES.forEach(ph => {
        const s = data.phases && data.phases[ph.id];
        if (s && s.diff !== null && s.sub !== null) {
          state[ph.id].diff = s.diff;
          state[ph.id].sub  = s.sub;
          any = true;
        }
      });
      return any;
    } catch (e) { return false; }
  }

  function clearSaved() {
    try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
    PHASES.forEach(ph => { state[ph.id].diff = null; state[ph.id].sub = null; });
    $('savedBanner').classList.remove('show');
    $('phasesGrid').innerHTML = '';
    buildCards();
    updateSummary();
  }

  const DAYS   = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  const MONTHS = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

  function updateClock() {
    const d = new Date(); let h = d.getHours(), m = d.getMinutes();
    const ap = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12;
    $('watchTime').textContent = String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
    $('watchAmpm').textContent = ap;
    $('watchDate').textContent = DAYS[d.getDay()] + ' ' + String(d.getDate()).padStart(2, '0') + ' ' + MONTHS[d.getMonth()];
  }

  function drawTicks() {
    const svg = $('watchSvg'), cx = 100, cy = 100, r1 = 93;
    for (let i = 0; i < 60; i++) {
      const a = (i / 60) * 2 * Math.PI - Math.PI / 2, isH = i % 5 === 0;
      const r2 = isH ? 84 : 88;
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', cx + r1 * Math.cos(a)); line.setAttribute('y1', cy + r1 * Math.sin(a));
      line.setAttribute('x2', cx + r2 * Math.cos(a)); line.setAttribute('y2', cy + r2 * Math.sin(a));
      line.setAttribute('stroke', isH ? 'rgba(46,139,94,0.45)' : 'rgba(60,100,60,0.18)');
      line.setAttribute('stroke-width', isH ? '2' : '1');
      line.setAttribute('stroke-linecap', 'round');
      svg.appendChild(line);
    }
  }

  let clockInt = null;
  function startClock() { updateClock(); clockInt = setInterval(updateClock, 10000); }
  function stopClock()  { clearInterval(clockInt); clockInt = null; }

  function buildCards() {
    const grid = $('phasesGrid');
    PHASES.forEach(ph => {
      const card = document.createElement('div');
      card.className = 'phase-card'; card.id = 'card_' + ph.id;
      const subHtml = ph.name ? `<div class="phase-sub">${ph.name}</div>` : '';
      card.innerHTML = `
        <div class="phase-header">
          <div class="phase-num">${ph.id.slice(1)}</div>
          <div>
            <div class="phase-title">${ph.label} — ${ph.ratio}</div>
            ${subHtml}
          </div>
        </div>
        <div class="diff-row">
          <div class="diff-btn easy"   data-ph="${ph.id}" data-d="easy">Easy</div>
          <div class="diff-btn medium" data-ph="${ph.id}" data-d="medium">Medium</div>
          <div class="diff-btn hard"   data-ph="${ph.id}" data-d="hard">Hard</div>
        </div>
        <div class="sub-levels" id="sub_${ph.id}">
          <div class="sub-btn" data-ph="${ph.id}" data-s="0">L1</div>
          <div class="sub-btn" data-ph="${ph.id}" data-s="1">L2</div>
          <div class="sub-btn" data-ph="${ph.id}" data-s="2">L3</div>
        </div>
        <div class="level-preview" id="prev_${ph.id}">Select a difficulty to configure this phase</div>
      `;
      grid.appendChild(card);
    });

    document.querySelectorAll('.diff-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const pid = btn.dataset.ph, d = btn.dataset.d;
        state[pid].diff = d; state[pid].sub = null;
        document.querySelectorAll(`[data-ph="${pid}"].diff-btn`).forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const subRow = $('sub_' + pid);
        subRow.classList.add('open');
        const ph = PHASES.find(x => x.id === pid);
        subRow.querySelectorAll('.sub-btn').forEach((sb, i) => {
          sb.classList.remove('active');
          const inh = ph.levels[d][i];
          sb.textContent = `L${i + 1}: ${inh}s`;
          sb.title = phaseSecs(ph, inh).map((s, j) => ph.phases[j] + ' ' + s + 's').join(' → ');
        });
        $('prev_' + pid).innerHTML = 'Pick a sub-level below';
        $('card_' + pid).classList.remove('selected');
        saveState(); updateSummary();
      });
    });

    document.querySelectorAll('.sub-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const pid = btn.dataset.ph, s = parseInt(btn.dataset.s);
        state[pid].sub = s;
        document.querySelectorAll(`[data-ph="${pid}"].sub-btn`).forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const ph = PHASES.find(x => x.id === pid);
        const d   = state[pid].diff;
        const inh = getInh(ph, d, s);
        const secs = phaseSecs(ph, inh);
        $('prev_' + pid).innerHTML = secs.map((sec, i) => `<span>${ph.phases[i]}</span> ${sec}s`).join(' · ');
        $('card_' + pid).classList.add('selected');
        saveState(); updateSummary();
      });
    });
  }

  function applyRestoredToUI() {
    PHASES.forEach(ph => {
      const d = state[ph.id].diff, s = state[ph.id].sub;
      if (d === null || s === null) return;
      document.querySelectorAll(`[data-ph="${ph.id}"].diff-btn`).forEach(b => {
        b.classList.remove('active');
        if (b.dataset.d === d) b.classList.add('active');
      });
      const subRow = $('sub_' + ph.id);
      subRow.classList.add('open');
      subRow.querySelectorAll('.sub-btn').forEach((sb, i) => {
        sb.classList.remove('active');
        const inh = ph.levels[d][i];
        sb.textContent = `L${i + 1}: ${inh}s`;
        if (i === s) sb.classList.add('active');
      });
      const inh  = getInh(ph, d, s);
      const secs = phaseSecs(ph, inh);
      $('prev_' + ph.id).innerHTML = secs.map((sec, i) => `<span>${ph.phases[i]}</span> ${sec}s`).join(' · ');
      $('card_' + ph.id).classList.add('selected');
    });
  }

  function updateSummary() {
    const active = PHASES.filter(ph => state[ph.id].diff !== null && state[ph.id].sub !== null);
    $('siCount').textContent = active.length;
    const pills    = $('siPhases'); pills.innerHTML = '';
    const totalSec = parseInt($('totalMin').value || 10) * 60;
    if (!active.length) { $('siTime').textContent = '—'; $('startBtn').disabled = true; return; }
    const perPhase = Math.floor(totalSec / active.length);
    let grand = 0;
    active.forEach(ph => {
      const d = state[ph.id].diff, s = state[ph.id].sub;
      const inh    = getInh(ph, d, s);
      const rd     = roundDur(ph, inh);
      const rounds = Math.max(1, Math.round(perPhase / rd));
      grand += rounds * rd;
      const pill = document.createElement('div'); pill.className = 'phase-pill';
      pill.textContent = `${ph.ratio} × ${rounds}r`;
      pills.appendChild(pill);
    });
    $('siTime').textContent  = fmtMMSS(grand);
    $('startBtn').disabled   = false;
  }

  /* ═══════════════════════════════════════════════
     AUDIO ENGINE

     beep(pn)
       Fires at the START of every inhale / hold / exhale step.
       Inhale  : sine     880 Hz  — high, bright
       Hold    : triangle 520 Hz  — mid, buzzy
       Exhale  : sine     220 Hz  — low, deep
       Duration ~0.45 s — well under 1 second.

     playAscendingChord(noteDur)
       Ascending 4-note chord: 440 → 550 → 660 → 880 Hz
       notes staggered 0.25 s apart, each sustains noteDur seconds.

     playPhaseComplete()
       Fires when ALL rounds of ONE phase finish (e.g. 1:1 done all 5 rounds).
       noteDur = 1.8 s

     playSessionComplete()
       Fires only when the entire session is over (all phases done).
       noteDur = 3.6 s  (double of phase complete)

     NO chord fires between individual steps or between rounds mid-phase.
  ═══════════════════════════════════════════════ */

  let audioCtx = null;

  function ensureCtx() {
    if (!audioCtx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AC();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
  }

  function beep(pn) {
    try {
      ensureCtx();
      const c = audioCtx, n = c.currentTime;
      const o = c.createOscillator(), g = c.createGain();
      const nm = (pn || '').toLowerCase();
      if (nm.includes('inhale')) {
        o.type = 'sine';     o.frequency.value = 880;
      } else if (nm.includes('hold')) {
        o.type = 'triangle'; o.frequency.value = 520;
      } else {
        o.type = 'sine';     o.frequency.value = 220;
      }
      g.gain.setValueAtTime(.0001, n);
      g.gain.exponentialRampToValueAtTime(.30, n + .015);
      g.gain.exponentialRampToValueAtTime(.0001, n + .42);
      o.connect(g); g.connect(c.destination);
      o.start(n); o.stop(n + .45);
    } catch (e) {}
  }

  function playAscendingChord(noteDur) {
    try {
      ensureCtx();
      const c = audioCtx, n = c.currentTime;
      const master = c.createGain();
      master.gain.setValueAtTime(.50, n);
      master.gain.exponentialRampToValueAtTime(.0001, n + noteDur * 4 + 1.0);
      master.connect(c.destination);
      [440, 550, 660, 880].forEach((freq, i) => {
        const t = n + i * 0.25;
        const o = c.createOscillator(), g = c.createGain();
        o.type = 'sine'; o.frequency.value = freq;
        g.gain.setValueAtTime(.0001, t);
        g.gain.exponentialRampToValueAtTime(.48, t + .02);
        g.gain.exponentialRampToValueAtTime(.0001, t + noteDur);
        o.connect(g); g.connect(master);
        o.start(t); o.stop(t + noteDur + .05);
      });
    } catch (e) {}
  }

  /* All rounds of one phase done → 1.8s chord */
  function playPhaseComplete()   { playAscendingChord(1.8); }

  /* All phases done → 3.6s chord (double) */
  function playSessionComplete() { playAscendingChord(3.6); }

  /* ── Arc animation ── */
  const CIRC = 2 * Math.PI * 86;
  let arcFrame = null, arcStart = 0, arcDur = 0, arcOn = false;

  const arcColor = pn => {
    const n = (pn || '').toLowerCase();
    return n.includes('inhale') ? '#1D9E75' : n.includes('hold') ? '#D85A30' : '#378ADD';
  };

  function startArc(dur, pn) {
    cancelAnimationFrame(arcFrame);
    $('arcEl').style.stroke = arcColor(pn);
    if ((pn || '').toLowerCase().includes('hold')) {
      arcOn = false; $('arcEl').style.strokeDashoffset = '0'; return;
    }
    arcOn = true; arcStart = performance.now(); arcDur = dur * 1000;
    const el = $('arcEl');
    const run = now => {
      if (!arcOn) return;
      const p = Math.min((now - arcStart) / arcDur, 1);
      el.style.strokeDashoffset = CIRC * (1 - p);
      if (p < 1) arcFrame = requestAnimationFrame(run);
    };
    arcFrame = requestAnimationFrame(run);
  }

  function resetArc() {
    arcOn = false; cancelAnimationFrame(arcFrame);
    $('arcEl').style.strokeDashoffset = CIRC;
    $('arcEl').style.stroke = '#1D9E75';
  }

  function buildChips(phases, activeIdx) {
    const row = $('phaseChips'); row.innerHTML = '';
    phases.forEach((p, i) => {
      const n    = p.toLowerCase();
      const base = n.includes('inhale') ? 'ci' : n.includes('hold') ? 'ch' : 'ce';
      const ch   = document.createElement('div');
      ch.className = 'pchip ' + (i === activeIdx ? 'active-' + base : base);
      ch.textContent = p;
      row.appendChild(ch);
    });
  }

  let toastTimer = null;
  function showToast(msg) {
    const el = $('skipToast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
  }

  /* ── Session engine ── */
  let sessionList = [], qIdx = 0, phaseIdx = 0, phaseRem = 0;
  let ticker = null, isPaused = false;

  const entry = () => sessionList[qIdx];

  function startPhase(idx) {
    const e = entry(); phaseIdx = idx;
    const dur = e.seconds[idx]; phaseRem = dur;
    $('arcCount').textContent = String(dur);
    $('arcPname').textContent = e.phases[idx];
    buildChips(e.phases, idx);
    beep(e.phases[idx]);
    startArc(dur, e.phases[idx]);
  }

  function tick() {
    if (isPaused) return;
    phaseRem--;
    if (phaseRem > 0) { $('arcCount').textContent = String(phaseRem); return; }

    const e    = entry();
    const next = (phaseIdx + 1) % e.phases.length;

    if (next === 0) {
      /* Completed one full breath round */
      e.roundsDone++;
      $('riRound').textContent = `Round ${e.roundsDone} / ${e.roundsTotal}`;

      if (e.roundsDone >= e.roundsTotal) {
        /* ALL rounds of this phase done — play phase-complete chord then move on */
        qIdx++;
        if (qIdx >= sessionList.length) {
          /* Last phase was also the last in session — session complete handles audio */
          endSession();
          return;
        }
        /* More phases remain — play phase-complete chord and continue */
        playPhaseComplete();
        const ne = entry();
        $('riPattern').textContent = ne.ph.ratio + (ne.ph.name ? ' — ' + ne.ph.name : '');
        $('riRound').textContent   = `Round 1 / ${ne.roundsTotal}`;
        $('riStatus').textContent  = `Phase ${qIdx + 1} of ${sessionList.length}`;
        startPhase(0);
        return;
      }
    }

    /* Mid-phase: just start next step, no chord */
    startPhase(next);
  }

  function skipPhase() {
    if (!ticker || isPaused) return;
    const skippedLabel = entry().ph.ratio;
    arcOn = false; cancelAnimationFrame(arcFrame);
    qIdx++;
    if (qIdx >= sessionList.length) {
      showToast('Last phase skipped — session ending');
      endSession(); return;
    }
    const ne = entry();
    showToast(`Skipped ${skippedLabel} → moving to ${ne.ph.ratio}`);
    $('riPattern').textContent = ne.ph.ratio + (ne.ph.name ? ' — ' + ne.ph.name : '');
    $('riRound').textContent   = `Round 1 / ${ne.roundsTotal}`;
    $('riStatus').textContent  = `Phase ${qIdx + 1} of ${sessionList.length}`;
    startPhase(0);
  }

  function startSession() {
    ensureCtx();
    const totalSec = parseInt($('totalMin').value || 10) * 60;
    const active   = PHASES.filter(ph => state[ph.id].diff !== null && state[ph.id].sub !== null);
    const perPhase = Math.floor(totalSec / active.length);

    sessionList = active.map(ph => {
      const d  = state[ph.id].diff, s = state[ph.id].sub;
      const inh    = getInh(ph, d, s);
      const rd     = roundDur(ph, inh);
      const rounds = Math.max(1, Math.round(perPhase / rd));
      return { ph, phases: ph.phases, seconds: phaseSecs(ph, inh), roundsTotal: rounds, roundsDone: 0 };
    });

    qIdx = 0;
    const e = entry();
    $('riPattern').textContent = e.ph.ratio + (e.ph.name ? ' — ' + e.ph.name : '');
    $('riRound').textContent   = `Round 1 / ${e.roundsTotal}`;
    $('riStatus').textContent  = `Phase 1 of ${sessionList.length}`;

    $('watchWrap').style.display = 'none'; stopClock();
    $('runner').classList.add('on');
    startPhase(0);

    clearInterval(ticker); isPaused = false;
    ticker = setInterval(tick, 1000);

    $('startBtn').disabled    = true;
    $('pauseBtn').disabled    = false;
    $('skipBtn').disabled     = false;
    $('stopBtn').disabled     = false;
    $('pauseBtn').textContent = 'Pause';
    saveState();
  }

  function togglePause() {
    if (!ticker) return;
    if (!isPaused) {
      isPaused = true; arcOn = false; cancelAnimationFrame(arcFrame);
      $('pauseBtn').textContent = 'Resume';
      $('skipBtn').disabled     = true;
      $('riStatus').textContent = 'Paused';
    } else {
    isPaused = false;
      $('pauseBtn').textContent = 'Pause';
      $('skipBtn').disabled     = false;
      if (audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume().then(() => beep(entry().phases[phaseIdx]));
      } else {
        beep(entry().phases[phaseIdx]);
      }
      const e = entry();
      if (!(e.phases[phaseIdx] || '').toLowerCase().includes('hold')) {
        arcOn    = true;
        arcStart = performance.now() - (arcDur - phaseRem * 1000);
        const el = $('arcEl');
        const run = now => {
          if (!arcOn) return;
          const p = Math.min((now - arcStart) / arcDur, 1);
          el.style.strokeDashoffset = CIRC * (1 - p);
          if (p < 1) arcFrame = requestAnimationFrame(run);
        };
        arcFrame = requestAnimationFrame(run);
      }
      $('riStatus').textContent = 'Running';
    }
  }

  function stopSession() {
    clearInterval(ticker); ticker = null; resetArc(); isPaused = false;
    $('runner').classList.remove('on');
    $('watchWrap').style.display = ''; startClock();
    $('startBtn').disabled    = false;
    $('pauseBtn').disabled    = true;
    $('skipBtn').disabled     = true;
    $('stopBtn').disabled     = true;
    $('pauseBtn').textContent = 'Pause';
    if (audioCtx) { audioCtx.close().catch(() => {}); audioCtx = null; }
  }

  function endSession() {
    clearInterval(ticker); ticker = null; resetArc(); isPaused = false;
    playSessionComplete();
    $('arcCount').textContent = '✓';
    $('arcPname').textContent = 'Done!';
    $('riStatus').textContent = 'Session complete — well done!';
    $('phaseChips').innerHTML = '';
    $('skipBtn').disabled     = true;
    setTimeout(() => {
      $('runner').classList.remove('on');
      $('watchWrap').style.display = ''; startClock();
      $('startBtn').disabled    = false;
      $('pauseBtn').disabled    = true;
      $('stopBtn').disabled     = true;
      if (audioCtx) { audioCtx.close().catch(() => {}); audioCtx = null; }
    }, 5000);
  }

  $('startBtn').addEventListener('click', startSession);
  $('pauseBtn').addEventListener('click', togglePause);
  $('skipBtn').addEventListener('click',  skipPhase);
  $('stopBtn').addEventListener('click',  stopSession);
  $('totalMin').addEventListener('input', () => { saveState(); updateSummary(); });
  $('clearBtn').addEventListener('click', clearSaved);

  buildCards();
  drawTicks(); startClock();
  const wasRestored = loadState();
  if (wasRestored) {
    applyRestoredToUI();
    $('savedBanner').classList.add('show');
  }
  updateSummary();

})();
</script>
</body>
</html>
